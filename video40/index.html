<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css transform</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 50px;
            width: 50px;
            background-color: rgb(252, 252, 15);
            border: 2px solid black;
            transform: rotate(0.125turn);
            /* transform: rotatez(9deg); */
            /* transform: skew(35deg); */
            /* transform: translatey(100%) skewX(40deg) translatex(-45%) ; */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: 100vw;
            height: 80vh;
            border: 2px solid rgb(249, 8, 165);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
Box
        </div>
    </div>
</body>
</html>
