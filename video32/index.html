<html lang="en">
<head>

    <title>CSS MULTICOLOR WEBSITE</title>
    <style>
        /* :root{
            --primary--color: rgb(232, 60, 229);

        :root{
            --primary--color: rgb(95, 79, 244);
            --text--color: white;
            --secondary--color:rgb(167, 202, 235);
        }
        body{
            background-color: var(--secondary--color);
        }
        *{
            margin: 0;
            padding: 0;
        }
ul li{
    list-style: none;
    color: var(--text--color);
     font-weight: bolder;
    padding: 23px;
    display: inline;
}
nav{
    background-color:var(--primary--color);
    padding: 23px 0 ;}
   ul li a{
    text-decoration: none;
    color: var(--text--color)
    }
   
    </style>
</head>
<body>
    <header>
        <ul>
    <nav>

            <li><a href="/">SERVICES</a></li>

            <li><a href="/">HOME</a></li>
        
    </nav>
</ul>
</header>
</body>
