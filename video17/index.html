<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* element selector */
        div {
            /* background-color: red; */
        }
        /* class selector */
         .red{
            background-color: red;
         }
    /* id selector */
    #green{
        background-color: green;
    }
    /* child selector */
    div>p{
        color: rgb(235, 56, 163);
        background-color: brown;
    }
    /* descendant selector */
    div p {
        color: rgb(246, 80, 188);
        background-color: brown;
    }

    /* universal selector */
    *{
        margin: 0;
        padding: 0;
        
    }
    /* pseudo selector */
    a:visited{
        color: yellow;
    }
    a:link{
        color: coral;
    }

    a:active{
        background-color: rgb(16, 248, 51);
    }
    a:hover{
        background-color: yellow
    }
    p:first-child{
        background-color: rgb(0, 255, 89);
    }


    </style>
</head>
<body>
    <main class="one">
        <p>i am first</p>
        <p>i am second</p>

    </main>
    
    <div class="red">
        I am a Div 
       <p>i am a paraa div</p>
        
    </div>
    <div id="green">
        hey this side vlogger

    </div>
    <a href="https://www.google.com">go to google</a>
    <a href="https://www.facebook2.com">go to facebbok</a>
</body>
</html>
