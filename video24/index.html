<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid violet;
            padding: 34px;
            box-shadow:5px 15px 5px #c8fd0a;
        }
        .text-box-shadow{
           text-shadow:  10px 5px 3px #f909bdb8;
       text-align: center;
           border: 2px solid blue;
           border-radius: 88px;
          
        }
    </style>
</head>
<body>
    <div class="box">
        i am a box
    </div>
    <p class="text-box-shadow">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quam quidem itaque sint delectus praesentium suscipit eos, inventore quasi obcaecati error possimus? Inventore, commodi!</p>
</body>
</html>
